{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2 class="card-title">Ping 网络诊断</h2>
    <form method="POST" action="/ping" class="form">
        <div class="form-group">
            <label for="ip">IP 地址或域名</label>
            <input type="text" id="ip" name="ip" class="form-input" placeholder="例如：8.8.8.8 或 example.com">
        </div>
        <button type="submit" class="btn btn-primary">Ping</button>
    </form>

    {% if result %}
    <div class="ping-result">
        <h3>执行结果</h3>
        <pre class="console-output">{{ result }}</pre>
    </div>
    {% endif %}
</div>
{% endblock %}
