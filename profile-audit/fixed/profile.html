{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2 class="card-title">个人中心</h2>
    <div class="user-info">
        <h3>用户资料</h3>
        <ul class="info-list">
            <li><span class="info-label">ID：</span>{{ user.id }}</li>
            <li><span class="info-label">用户名：</span>{{ user.username }}</li>
            <li><span class="info-label">邮箱：</span>{{ user.email }}</li>
            <li><span class="info-label">手机：</span>{{ user.phone }}</li>
            <li><span class="info-label">余额：</span>{{ user.balance }}</li>
        </ul>
    </div>

    <h3>充值</h3>
    {# 修复 VULN-PR-05：充值表单增加 CSRF Token 隐藏字段 #}
    <form method="POST" action="/recharge" class="form">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="user_id" value="{{ user.id }}">
        <div class="form-group">
            <label for="amount">充值金额</label>
            <input type="number" id="amount" name="amount" class="form-input" placeholder="请输入金额" min="1" required>
        </div>
        <button type="submit" class="btn btn-primary">充值</button>
    </form>
</div>
{% endblock %}
