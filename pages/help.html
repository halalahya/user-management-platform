<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>帮助中心</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; color: #333; }
        h1 { color: #667eea; }
        .help-section { margin-bottom: 20px; }
        .help-section h2 { color: #555; font-size: 18px; }
        .help-section p { font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>
    <h1>帮助中心</h1>
    <div class="help-section">
        <h2>如何登录系统？</h2>
        <p>在登录页面输入您的用户名和密码，点击"登录"按钮即可进入系统。默认管理员账号为 admin。</p>
    </div>
    <div class="help-section">
        <h2>如何注册账号？</h2>
        <p>点击导航栏的"注册"链接，填写用户名、密码、邮箱和手机号即可完成注册。</p>
    </div>
    <div class="help-section">
        <h2>如何搜索用户？</h2>
        <p>登录后，在首页的搜索框中输入用户名或邮箱关键词，点击"搜索"按钮即可查询用户信息。</p>
    </div>
    <div class="help-section">
        <h2>如何上传头像？</h2>
        <p>登录后，点击导航栏的"上传头像"链接，选择图片文件并点击"上传"即可。</p>
    </div>
    <div class="help-section">
        <h2>如何查看个人资料和充值？</h2>
        <p>登录后，点击导航栏的"个人中心"链接，可以查看您的资料信息并进行账户充值。</p>
    </div>
</body>
</html>
