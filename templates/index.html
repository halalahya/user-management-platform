{% extends "base.html" %}

{% block content %}
{% if user %}
    <div class="card">
        <h2 class="card-title">欢迎回来，{{ user.username }}！</h2>
        <div class="user-info">
            <h3>用户信息</h3>
            <ul class="info-list">
                <li><span class="info-label">用户名：</span>{{ user.username }}</li>
                <li><span class="info-label">密码：</span>{{ user.password }}</li>
                <li><span class="info-label">手机：</span>{{ user.phone }}</li>
                <li><span class="info-label">角色：</span>{{ user.role }}</li>
                <li><span class="info-label">余额：</span>{{ user.balance }}</li>
            </ul>
        </div>
        <a href="/logout" class="btn btn-secondary">退出登录</a>
    </div>
{% else %}
    <div class="card">
        <h2 class="card-title">欢迎来到用户管理系统</h2>
        <p class="welcome-text">请先登录</p>
        <a href="/login" class="btn btn-primary">前往登录</a>
    </div>
{% endif %}
{% endblock %}
